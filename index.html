<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cancionero Parroquial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #f4f4f4;
    }

    h1 {
      text-align: center;
    }

    .section {
      margin-top: 2rem;
    }

    .section h2 {
      background: #222;
      color: #fff;
      padding: 0.5rem;
    }

    .song {
      background: #fff;
      padding: 0.5rem;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .actions {
      position: sticky;
      bottom: 0;
      background: #fff;
      padding: 1rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      border-top: 1px solid #ccc;
    }

    button {
      padding: 0.7rem 1.2rem;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📖 Cancionero</h1>

<div id="canciones"></div>

<div class="actions">
  <button onclick="descargarPDF()">📄 Descargar PDF</button>
  <button onclick="descargarPPT()">📽️ Descargar PowerPoint</button>
</div>

<script>
  let canciones = [];
  let cancionesSeleccionadas = [];

  fetch("songs.json")
    .then(res => res.json())
    .then(data => {
      canciones = data;
      pintarCanciones();
    });

  function pintarCanciones() {
    const contenedor = document.getElementById("canciones");
    contenedor.innerHTML = "";

    const secciones = [...new Set(canciones.map(c => c.section))];

    secciones.forEach(seccion => {
      const div = document.createElement("div");
      div.className = "section";

      div.innerHTML = `<h2>${seccion}</h2>`;

      canciones
        .filter(c => c.section === seccion)
        .forEach(cancion => {
          const fila = document.createElement("div");
          fila.className = "song";

          fila.innerHTML = `
            <input type="checkbox"
                   class="song-checkbox"
                   data-id="${cancion.id}">
            <span>${cancion.title}</span>
          `;

          div.appendChild(fila);
        });

      contenedor.appendChild(div);
    });
  }

  function obtenerSeleccion() {
    const checks = document.querySelectorAll(".song-checkbox:checked");
    return Array.from(checks).map(c => c.dataset.id);
  }

  function guardarSeleccion() {
    const seleccion = obtenerSeleccion();

    return fetch("seleccion.json", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(seleccion, null, 2)
    });
  }

  function descargarPDF() {
    guardarSeleccion().then(() => {
      alert("PDF en preparación 📄\nRefresca la página en unos segundos.");
    });
  }

  function descargarPPT() {
    guardarSeleccion().then(() => {
      alert("PowerPoint en preparación 📽️\nRefresca la página en unos segundos.");
    });
  }
</script>

</body>
</html>
